name: Backend CI

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    name: Django Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    # ── PostgreSQL service container ────────────────────────────────────
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB:       signmeet_db
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # ── environment variables ────────────────────────────────────────────
    env:
      SECRET_KEY:   ci-insecure-secret-key-not-for-production
      DEBUG:        "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME:      signmeet_db
      DB_USER:      postgres
      DB_PASSWORD:  postgres_ci
      DB_HOST:      localhost
      DB_PORT:      "5432"
      REDIS_URL:    ""          # blank → InMemoryChannelLayer

    steps:
      # ── checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python ────────────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      # ── dependencies ──────────────────────────────────────────────────
      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── static analysis ───────────────────────────────────────────────
      - name: Django system check
        working-directory: backend
        run: python manage.py check

      # ── migrations ────────────────────────────────────────────────────
      - name: Apply migrations
        working-directory: backend
        run: python manage.py migrate --no-input

      # ── tests ─────────────────────────────────────────────────────────
      - name: Run test suite
        working-directory: backend
        run: |
          python manage.py test video_call.tests \
            --verbosity=2 \
            --keepdb

      # ── coverage (optional — upload as artifact) ───────────────────────
      - name: Generate coverage report
        working-directory: backend
        run: |
          pip install coverage
          coverage run manage.py test video_call.tests --keepdb
          coverage xml -o coverage.xml
          coverage report --show-missing
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-py${{ matrix.python-version }}
          path: backend/coverage.xml
          retention-days: 7
